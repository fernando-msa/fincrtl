name: CI

on:
  pull_request:
  push:
    branches: ["main", "master", "work"]

jobs:
  syntax-and-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JavaScript syntax check (node --check)
        run: |
          set -euo pipefail
          files=$(find . -type f -name "*.js" -not -path "./.git/*")
          for f in $files; do
            node --check "$f"
          done

      - name: Validate required app files
        run: |
          test -f index.html
          test -f js/firebase.js
          test -f js/app.js
          test -f pages/plano.html
          test -f pages/diagnostico.html

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
